name: windows-ci-x86

on:
  push:
    branches: [ "main", "copilot/fix-dll-export-name", "copilot/create-tradestation-deliverable" ]
  pull_request:
    branches: [ "main", "copilot/add-x86-win32-build-configuration" ]
  workflow_dispatch:

jobs:
  build-and-test-x86:
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build solution (Win32 Release)
        shell: pwsh
        run: .\scripts\build-windows.ps1 -Configuration Release -Platform Win32

      - name: Run BridgeCoreTests (x86)
        shell: pwsh
        run: |
          $exe = "Win32\Release\BridgeCoreTests.exe"
          if (-not (Test-Path $exe)) { throw "Test executable not found: $exe" }
          & $exe
          if ($LASTEXITCODE -ne 0) { throw "BridgeCoreTests failed with exit code $LASTEXITCODE" }

      - name: Run BridgeTSTests (x86)
        shell: pwsh
        run: |
          $exe = "Win32\Release\BridgeTSTests.exe"
          if (-not (Test-Path $exe)) { throw "BridgeTSTests not found: $exe" }
          & $exe
          if ($LASTEXITCODE -ne 0) { throw "BridgeTSTests failed with exit code $LASTEXITCODE" }

      - name: Verify DLL is 32-bit
        shell: pwsh
        run: |
          $dll = "Win32\Release\BridgeTS.dll"
          if (-not (Test-Path $dll)) { throw "BridgeTS.dll not found at $dll" }
          $bytes = [System.IO.File]::ReadAllBytes((Resolve-Path $dll))
          # PE header offset is at 0x3C
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
          # Machine type is at PE offset + 4
          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          # 0x014C = IMAGE_FILE_MACHINE_I386 (32-bit x86)
          # 0x8664 = IMAGE_FILE_MACHINE_AMD64 (64-bit x64)
          Write-Host "Machine type: 0x$($machine.ToString('X4'))"
          if ($machine -ne 0x014C) {
            throw "DLL is NOT 32-bit! Machine type 0x$($machine.ToString('X4')) expected 0x014C (x86)"
          }
          Write-Host "CONFIRMED: BridgeTS.dll is a valid 32-bit (x86) DLL"
          $size = (Get-Item $dll).Length
          Write-Host "DLL size: $size bytes"

      - name: Verify PLACE_ORDER export (no decoration)
        shell: pwsh
        run: |
          $dll = "Win32\Release\BridgeTS.dll"
          if (-not (Test-Path $dll)) { throw "BridgeTS.dll not found at $dll" }
          # Locate dumpbin via vswhere (available on GitHub-hosted windows-2022 runner)
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $vsPath) { throw "Visual Studio not found via vswhere" }
          $dumpbin = Get-ChildItem -Path $vsPath -Recurse -Filter "dumpbin.exe" -ErrorAction SilentlyContinue |
                     Select-Object -First 1 -ExpandProperty FullName
          if (-not $dumpbin) { throw "dumpbin.exe not found under $vsPath" }
          Write-Host "Using dumpbin: $dumpbin"
          $exports = & "$dumpbin" /EXPORTS "$dll" 2>&1
          if ($LASTEXITCODE -ne 0) { throw "dumpbin failed with exit code $LASTEXITCODE" }
          Write-Host "=== dumpbin /EXPORTS output ==="
          $exports | Write-Host
          Write-Host "==============================="
          # Must contain plain PLACE_ORDER (undecorated)
          $hasClean = $exports | Select-String -Pattern '\bPLACE_ORDER\b' -Quiet
          if (-not $hasClean) {
            throw "PLACE_ORDER not found in DLL exports — name decoration may be present"
          }
          # Must NOT contain the stdcall-decorated form _PLACE_ORDER@44
          $hasDecorated = $exports | Select-String -Pattern '_PLACE_ORDER@' -Quiet
          if ($hasDecorated) {
            throw "Decorated export _PLACE_ORDER@N found — .DEF file is not stripping the stdcall decoration"
          }
          Write-Host "CONFIRMED: PLACE_ORDER is exported without stdcall decoration"

      - name: Collect logs
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "logs") {
            Get-ChildItem logs -Recurse | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "No logs directory found."
          }

      - name: Upload x86 artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-release-x86
          path: |
            Win32/Release/BridgeTS.dll
            Win32/Release/BridgeCoreTests.exe
            Win32/Release/BridgeTSTests.exe
            config/bridge.example.json
            docs/
            logs/
